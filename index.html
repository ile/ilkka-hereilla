<!DOCTYPE html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nukkuuko Ilkka tänä yönä?</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' font-size='48'%3E%F0%9F%98%B4%3C/text%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./styles2.css" />
  </head>
  <body>
    <div class="sky" aria-hidden="true">
      <div class="cloud cloud-one"></div>
      <div class="cloud cloud-two"></div>
      <div class="cloud cloud-three"></div>
      <div class="cloud cloud-four"></div>
      <div class="cloud cloud-five"></div>
    </div>

    <main class="app-shell">
      <section class="hero-card">
        <p class="eyebrow">Ilkan yörytmi</p>
        <h1 id="question">Valvooko Ilkka tänä yönä?</h1>

        <div class="status-panel" aria-live="polite">
          <p id="statusAnswer" class="status-answer">Ladataan...</p>
        </div>

        <div class="legend">
          <span class="legend-item">
            <span class="legend-swatch awake"></span> Valvoo
          </span>
          <span class="legend-item">
            <span class="legend-swatch asleep"></span> Nukkuu
          </span>
        </div>
      </section>

      <section class="calendar-card">
        <div class="calendar-toolbar">
          <button id="prevMonthButton" class="nav-button" type="button">
            Edellinen
          </button>
          <div>
            <p class="calendar-kicker">Kuukausinäkymä</p>
            <h2 id="calendarTitle">Kuukausi</h2>
          </div>
          <button id="nextMonthButton" class="nav-button" type="button">
            Seuraava
          </button>
        </div>

        <div class="weekday-row" aria-hidden="true">
          <span>Ma</span>
          <span>Ti</span>
          <span>Ke</span>
          <span>To</span>
          <span>Pe</span>
          <span>La</span>
          <span>Su</span>
        </div>

        <div id="calendarGrid" class="calendar-grid"></div>
      </section>
    </main>

    <script src="./script7.js"></script>
  </body>
</html>
